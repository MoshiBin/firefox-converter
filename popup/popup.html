<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    h2 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #7ecfff;
    }

    label {
      display: block;
      font-size: 12px;
      color: #8888aa;
      margin-bottom: 4px;
    }

    select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      background: #0f0f23;
      color: #e0e0e0;
      font-size: 13px;
      margin-bottom: 12px;
      cursor: pointer;
    }

    select:focus {
      outline: none;
      border-color: #7ecfff;
    }

    .status {
      font-size: 11px;
      color: #6a6;
      min-height: 16px;
      margin-top: 4px;
    }

    .rate-info {
      font-size: 11px;
      color: #666;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #2a2a4a;
    }

    button {
      width: 100%;
      padding: 8px;
      border: 1px solid #3a3a5c;
      border-radius: 6px;
      background: #2a2a4a;
      color: #e0e0e0;
      font-size: 12px;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      background: #3a3a5c;
    }
  </style>
</head>
<body>
  <h2>Unit Converter Settings</h2>

  <label for="currency">Target Currency</label>
  <select id="currency"></select>

  <div class="status" id="status"></div>

  <button id="refresh">Refresh Exchange Rates</button>

  <div class="rate-info" id="rate-info"></div>

  <script src="popup.js"></script>
</body>
</html>
