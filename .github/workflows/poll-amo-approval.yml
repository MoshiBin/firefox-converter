name: Attach approved XPIs

# Mozilla's review of a listed version is asynchronous (hours to days), so the
# signed XPI can't be attached at release time. This job polls AMO on a schedule
# and, for any recent release whose AMO version has been approved (status
# "public") but doesn't yet have an .xpi attached, downloads and attaches it.
# Fully hands-off — it just catches up whenever Mozilla finishes reviewing.

on:
  schedule:
    - cron: "17 * * * *"  # hourly, at :17
  workflow_dispatch:

permissions:
  contents: write

jobs:
  attach:
    runs-on: ubuntu-latest

    steps:
      - name: Attach any newly-approved XPIs
        env:
          AMO_JWT_ISSUER: ${{ secrets.AMO_JWT_ISSUER }}
          AMO_JWT_SECRET: ${{ secrets.AMO_JWT_SECRET }}
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import hmac, hashlib, base64, json, time, uuid, urllib.request, urllib.error, os, subprocess

          issuer = os.environ["AMO_JWT_ISSUER"]
          secret = os.environ["AMO_JWT_SECRET"].encode()
          repo   = os.environ["REPO"]
          ADDON  = "unit-converter4"

          def b64url(data):
              if isinstance(data, str): data = data.encode()
              return base64.urlsafe_b64encode(data).rstrip(b"=").decode()

          def token():
              now = int(time.time())
              hdr = b64url(json.dumps({"alg": "HS256", "typ": "JWT"}))
              pld = b64url(json.dumps({"iss": issuer, "jti": str(uuid.uuid4()),
                                       "iat": now, "exp": now + 300}))
              sig = b64url(hmac.new(secret, f"{hdr}.{pld}".encode(), hashlib.sha256).digest())
              return f"{hdr}.{pld}.{sig}"

          def amo_get(url):
              req = urllib.request.Request(url, headers={"Authorization": f"JWT {token()}"})
              with urllib.request.urlopen(req) as r:
                  return json.load(r)

          # Most recent AMO versions, newest first.
          data = amo_get(
              f"https://addons.mozilla.org/api/v5/addons/addon/{ADDON}/versions/"
              f"?filter=all_with_unlisted&ordering=-created&page_size=10"
          )

          attached = 0
          for v in data.get("results", []):
              version = v["version"]
              tag = f"v{version}"
              file_info = v.get("file", {})
              status = file_info.get("status")
              xpi_url = file_info.get("url")

              if status != "public" or not xpi_url:
                  print(f"{tag}: AMO status '{status}' — skipping")
                  continue

              # Is there a GitHub release for this tag, and does it already have an XPI?
              res = subprocess.run(
                  ["gh", "release", "view", tag, "--repo", repo, "--json", "assets"],
                  capture_output=True, text=True
              )
              if res.returncode != 0:
                  print(f"{tag}: no GitHub release — skipping")
                  continue
              assets = json.loads(res.stdout or "{}").get("assets", [])
              if any(a["name"].endswith(".xpi") for a in assets):
                  print(f"{tag}: XPI already attached")
                  continue

              # Download the approved, signed XPI (auth required) and attach it.
              xpi_name = f"unit_converter-{tag}.xpi"
              print(f"{tag}: approved — downloading signed XPI ...")
              req = urllib.request.Request(xpi_url, headers={"Authorization": f"JWT {token()}"})
              with urllib.request.urlopen(req) as r, open(xpi_name, "wb") as f:
                  f.write(r.read())

              subprocess.run(
                  ["gh", "release", "upload", tag, xpi_name, "--repo", repo, "--clobber"],
                  check=True
              )
              print(f"{tag}: attached {xpi_name}")
              attached += 1

          print(f"Done — attached {attached} XPI(s).")
          PYEOF
