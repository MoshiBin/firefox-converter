name: Publish to AMO

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag_name:
        description: "The release tag (e.g. v1.2.3)"
        required: true
        type: string
    secrets:
      AMO_JWT_ISSUER:
        required: true
      AMO_JWT_SECRET:
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to upload release assets

    steps:
      - uses: actions/checkout@v4
        with:
          # When called via workflow_call the default ref is the caller's
          # branch, so we pin to the tag explicitly.
          ref: ${{ inputs.tag_name || github.ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install web-ext
        run: npm install -g web-ext

      - name: Sync version from tag
        run: |
          TAG="${{ inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#v}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json
          mv manifest.tmp.json manifest.json
          echo "Version set to $VERSION"

      - name: Build extension
        run: web-ext build

      - name: Submit to AMO
        run: |
          web-ext sign \
            --api-key="${{ secrets.AMO_JWT_ISSUER }}" \
            --api-secret="${{ secrets.AMO_JWT_SECRET }}" \
            --channel=listed \
            --no-config-discovery
        # For listed extensions AMO still requires human review before
        # the new version goes live — this step submits it into the queue.
        # Change --channel=listed to --channel=unlisted for auto-approval.

      - name: Upload zip to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: web-ext-artifacts/*.zip
